configurations:
  - host: mail.intern.tuwien.ac.at
    port: 993
    tls: true
    tlsOptions:
      rejectUnauthorized: false
    usernameCMD: "pass show tuw/mail | awk 'NR==4 {print $2}'"
    passwordCMD: 'pass show tuw/mail | head -n1'
    boxes:
      - mailbox: INBOX
        onNewMail: 'mbsync -c "$XDG_CONFIG_HOME/isync/mbsyncrc" tuw'
